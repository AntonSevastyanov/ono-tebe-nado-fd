a<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

  <body>
    <header class="header">

        <div class="description">

      <section class="lots">

        <ul class="lots-card-list">
          <li class="lots-card-list-item">

                <p class="card-text"></p>
              </article>
            </a>

          <li class="lots-card-list-item">

                <header class="card-title"></header>
                <p class="card-text"></p>
              </article>
            </a>
          </li>
          <li class="lots-card-list-item">
            <a href="" class="card-link">
              <article class="card card-type-picture overlay">
                <header class="card-title"></header>
                <p class="card-text"></p>
              </article>
            </a>

        </ul>

    <footer class="footer">

      <nav class="footer-menu">
        <ul class="footer-menu-list">
          <li class="footer-menu-list-item">
